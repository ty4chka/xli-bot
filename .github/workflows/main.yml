name: Build XLI Bot
on:
  workflow_dispatch:
    inputs:
      goos:
        description: 'Target OS'
        default: 'linux'
        type: choice
        options: [linux, darwin, windows]
      goarch:
        description: 'Target Architecture'
        default: 'arm64'
        type: choice
        options: [amd64, arm64, 386]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go mod download
      - run: CGO_ENABLED=0 GOOS=${{ github.event.inputs.goos }} GOARCH=${{ github.event.inputs.goarch }} go build -ldflags="-s -w" -o xli-bot-${{ github.event.inputs.goos }}-${{ github.event.inputs.goarch }} ./cmd/bot
      - uses: actions/upload-artifact@v4
        with:
          name: xli-bot-${{ github.event.inputs.goos }}-${{ github.event.inputs.goarch }}
          path: xli-bot-${{ github.event.inputs.goos }}-${{ github.event.inputs.goarch }}
